# Usage documentation: lint_workflows.md

on:
  workflow_call:

jobs:
  lint:
    name: Lint .github/workflows/
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install actionlint
        id: install
        run: |
          curl -O https://raw.githubusercontent.com/rhysd/actionlint/main/.github/actionlint-matcher.json
          echo "::add-matcher::actionlint-matcher.json"
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Install zizmor
        run: pipx install zizmor
      - name: Run actionlint
        run: |
          "${ACTIONLINT_EXECUTABLE}" -color
        env:
          ACTIONLINT_EXECUTABLE: ${{ steps.install.outputs.executable }}
      - name: Run zizmor
        run: zizmor .
    permissions:
      contents: read
