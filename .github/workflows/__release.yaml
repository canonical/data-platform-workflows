name: Release workflows

on:
  push:
    branches:
      - main

jobs:     
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0  # Checkout history with git tags
      - name: Install CLI
        run: pipx install ./_cli
      - name: Create release tag
        id: create-tag
        run: create-semantic-version-tag
      - name: Update major version tag
        run: |
          git tag "${MAJOR_TAG}" --force
          git push origin "${MAJOR_TAG}" --force
        env:
          MAJOR_TAG: ${{ steps.create-tag.outputs.major_version_tag }}
      - name: Create release
        run: |
          gh release create "${RELEASE_TAG}" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.create-tag.outputs.tag }}
    permissions:
      contents: write  # Needed to create release
