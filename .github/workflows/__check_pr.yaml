name: Check pull request

on:
  pull_request:
    types:
      - opened
      - edited
    branches:
      - main

jobs:
  check-pr:
    name: Check pull request
    uses: ./.github/workflows/check_python_package_pr.yaml
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version
